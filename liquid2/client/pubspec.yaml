name: liquid2_client
description: Flutter client for Liquid2.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  built_collection: ^5.1.1
  dio: ^5.9.2
  file_picker: ^11.0.2
  flutter:
    sdk: flutter
  flutter_markdown_plus: ^1.0.7
  flutter_riverpod: ^3.3.1
  go_router: ^17.3.0
  liquid2_api:
    path: api
  markdown: ^7.3.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
